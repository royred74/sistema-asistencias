<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏫 App San José</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #2e7d32;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #666;
        }
        .user-type-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
        }
        .user-type-btn {
            padding: 10px 20px;
            border: 2px solid #2e7d32;
            border-radius: 30px;
            background: white;
            color: #2e7d32;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1 1 auto;
            min-width: 100px;
        }
        .user-type-btn.selected {
            background: #2e7d32;
            color: white;
        }
        .user-type-btn:hover {
            background: #f6d365;
            border-color: #f6d365;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #f6d365;
            border-radius: 8px;
            font-size: 1em;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2e7d32;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #1e5e22;
        }
        .error-message {
            color: #d32f2f;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .dashboard-header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .dashboard-header h2 {
            color: #333;
        }
        .btn-salir {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .dashboard-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }
        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .sidebar li:hover {
            background: #f6d365;
        }
        .sidebar li.active {
            background: #2e7d32;
            color: white;
        }
        .main-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f6d365;
            font-weight: bold;
        }
        .btn-asistencia {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }
        .btn-ausente {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .presente {
            color: #2e7d32;
            font-weight: bold;
        }
        .ausente {
            color: #d32f2f;
            font-weight: bold;
        }
        .horario-card {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 5px solid #2e7d32;
        }
        .horario-card h4 {
            color: #333;
            margin-bottom: 5px;
        }
        .horario-card p {
            color: #666;
        }
        .config-card {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        .config-card input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #f6d365;
            border-radius: 5px;
        }
        .btn-cambiar {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .info-box {
            background: #f6d365;
            color: #333;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- PANTALLA DE LOGIN -->
        <div id="login-screen" class="login-container">
            <div class="login-header">
                <h1>🏫 App San José</h1>
                <p>Selecciona tu tipo de usuario</p>
            </div>
            
            <div class="user-type-selector" id="userTypeSelector">
                <button class="user-type-btn" onclick="selectUserType('profesor')">👨‍🏫 Profesor</button>
                <button class="user-type-btn" onclick="selectUserType('estudiante')">🧑‍🎓 Estudiante</button>
                <button class="user-type-btn" onclick="selectUserType('admin')">👑 Admin</button>
                <button class="user-type-btn" onclick="selectUserType('director')">🎯 Director</button>
                <button class="user-type-btn" onclick="selectUserType('padre')">👪 Padre</button>
            </div>
            
            <div id="loginForm" style="display: none;">
                <div class="form-group">
                    <label id="emailLabel">Correo institucional</label>
                    <input type="email" id="email" placeholder="correo@colegio.edu">
                </div>
                
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña">
                </div>
                
                <button class="btn-login" onclick="login()">Iniciar sesión</button>
                <button class="btn-login" onclick="backToUserType()" style="background: #f6d365; color: #333; margin-top: 10px;">⬅ Volver</button>
            </div>
            
            <div id="login-error" class="error-message"></div>
            
            <div class="info-box" id="infoBox">
                💡 Selecciona tu tipo de usuario primero
            </div>
        </div>

        <!-- DASHBOARD DEL PROFESOR -->
        <div id="profesor-dashboard" style="display: none;">[Contenido del profesor - igual que antes]</div>
        <div id="estudiante-dashboard" style="display: none;">[Contenido del estudiante - igual que antes]</div>
        <div id="admin-dashboard" style="display: none;">[Contenido admin - próximo]</div>
        <div id="director-dashboard" style="display: none;">[Contenido director - próximo]</div>
        <div id="padre-dashboard" style="display: none;">[Contenido padre - próximo]</div>
    </div>

    <script>
        // Base de datos de usuarios
        const usuarios = {
            "maria@colegio.edu": { id: 1, nombre: "María Torres", rol: "profesor", password: "123456", curso: "Matemáticas", grado: "5to A" },
            "juan@colegio.edu": { id: 2, nombre: "Juan Pérez", rol: "profesor", password: "123456", curso: "Ciencias", grado: "5to A" },
            "luis@colegio.edu": { id: 3, nombre: "Luis Estudiante", rol: "estudiante", password: "123456", grado: "5to A" },
            "sofia@colegio.edu": { id: 4, nombre: "Sofía Martínez", rol: "estudiante", password: "123456", grado: "5to A" },
            "admin@colegio.edu": { id: 5, nombre: "Ana Admin", rol: "admin", password: "123456" },
            "director@colegio.edu": { id: 6, nombre: "Carlos Director", rol: "director", password: "123456" },
            "padre@colegio.edu": { id: 7, nombre: "Roberto Padre", rol: "padre", password: "123456" }
        };

        let userTypeSelected = '';
        let usuarioActual = null;

        function selectUserType(type) {
            userTypeSelected = type;
            
            // Actualizar botones
            document.querySelectorAll('.user-type-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
            
            // Mostrar formulario de login
            document.getElementById('userTypeSelector').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            
            // Actualizar mensaje según tipo
            const tipos = {
                profesor: 'Ingresa tu correo de profesor',
                estudiante: 'Ingresa tu correo de estudiante',
                admin: 'Ingresa tu correo de administrador',
                director: 'Ingresa tu correo de director',
                padre: 'Ingresa tu correo de padre'
            };
            document.getElementById('infoBox').innerHTML = `💡 ${tipos[type]}`;
        }

        function backToUserType() {
            userTypeSelected = '';
            document.getElementById('userTypeSelector').style.display = 'flex';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('infoBox').innerHTML = '💡 Selecciona tu tipo de usuario primero';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const usuario = usuarios[email];
            
            if (!usuario) {
                document.getElementById('login-error').innerText = '❌ Usuario no encontrado';
                return;
            }
            
            if (usuario.rol !== userTypeSelected) {
                document.getElementById('login-error').innerText = `❌ Este correo no corresponde a un ${userTypeSelected}`;
                return;
            }
            
            if (usuario.password !== password) {
                document.getElementById('login-error').innerText = '❌ Contraseña incorrecta';
                return;
            }
            
            usuarioActual = usuario;
            document.getElementById('login-screen').style.display = 'none';
            
            // Redirigir según rol
            if (usuario.rol === 'profesor') {
                document.getElementById('profesor-dashboard').style.display = 'block';
                cargarProfesor(usuario);
            } else if (usuario.rol === 'estudiante') {
                document.getElementById('estudiante-dashboard').style.display = 'block';
                cargarEstudiante(usuario);
            } else {
                alert(`Bienvenido ${usuario.nombre} (${usuario.rol}). Los demás roles estarán disponibles pronto.`);
                logout();
            }
        }

        function logout() {
            usuarioActual = null;
            userTypeSelected = '';
            document.getElementById('profesor-dashboard').style.display = 'none';
            document.getElementById('estudiante-dashboard').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('userTypeSelector').style.display = 'flex';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('login-error').innerText = '';
            document.getElementById('infoBox').innerHTML = '💡 Selecciona tu tipo de usuario primero';
        }

        // Funciones específicas (simplificadas)
        function cargarProfesor(profesor) {
            console.log('Cargando profesor:', profesor);
        }

        function cargarEstudiante(estudiante) {
            console.log('Cargando estudiante:', estudiante);
        }
    </script>
</body>
</html>

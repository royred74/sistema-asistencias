<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App San José · Sistema de Asistencias</title>
    
    <!-- Font Awesome para íconos profesionales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="../fuente/css/main.css">
</head>
<body>
    <div class="container">
        <!-- Tarjeta de login -->
        <div class="login-card">
            <!-- Encabezado con logo -->
            <div class="login-header">
                <div class="logo-wrapper">
                    <div class="logo">
                        <i class="fas fa-school"></i>
                    </div>
                </div>
                <h1>App San José</h1>
                <p class="subtitle">Sistema de Gestión Educativa</p>
            </div>

            <!-- Selector de roles (visible inicialmente) -->
            <div class="role-section" id="roleSection">
                <p class="section-title">Selecciona tu perfil</p>
                <div class="role-grid">
                    <button class="role-btn" onclick="selectRole('admin')" data-role="admin">
                        <i class="fas fa-crown role-icon"></i>
                        <span class="role-name">Administrador</span>
                        <span class="role-desc">Gestión completa</span>
                    </button>
                    
                    <button class="role-btn" onclick="selectRole('director')" data-role="director">
                        <i class="fas fa-chart-line role-icon"></i>
                        <span class="role-name">Director</span>
                        <span class="role-desc">Supervisión general</span>
                    </button>
                    
                    <button class="role-btn" onclick="selectRole('profesor')" data-role="profesor">
                        <i class="fas fa-chalkboard-teacher role-icon"></i>
                        <span class="role-name">Profesor</span>
                        <span class="role-desc">Asistencia y notas</span>
                    </button>
                    
                    <button class="role-btn" onclick="selectRole('estudiante')" data-role="estudiante">
                        <i class="fas fa-user-graduate role-icon"></i>
                        <span class="role-name">Estudiante</span>
                        <span class="role-desc">Ver mi progreso</span>
                    </button>
                    
                    <button class="role-btn" onclick="selectRole('padre')" data-role="padre">
                        <i class="fas fa-users role-icon"></i>
                        <span class="role-name">Padre de familia</span>
                        <span class="role-desc">Seguimiento de hijos</span>
                    </button>
                </div>
            </div>

            <!-- Formulario de login (oculto inicialmente) -->
            <div class="form-section hidden" id="loginSection">
                <div class="form-header">
                    <i class="fas fa-user-lock"></i>
                    <h2 id="formTitle">Iniciar sesión</h2>
                </div>
                
                <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Correo institucional
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="nombre@colegio.edu" 
                            required
                            autocomplete="off"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Contraseña
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••" 
                            required
                            autocomplete="current-password"
                        >
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="fas fa-sign-in-alt"></i>
                        Iniciar sesión
                    </button>

                    <button type="button" class="btn-back" onclick="showRoleSelector()">
                        <i class="fas fa-arrow-left"></i>
                        Volver a perfiles
                    </button>
                </form>

                <div id="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span></span>
                </div>
            </div>

            <!-- Mensaje de ayuda -->
            <div class="help-text">
                <i class="fas fa-question-circle"></i>
                <span>¿Problemas para acceder? Contacta al administrador</span>
            </div>
        </div>

        <!-- Pie de página -->
        <div class="footer">
            <p>© 2026 Colegio San José · Todos los derechos reservados</p>
            <p class="version">Versión 2.0.0</p>
        </div>
    </div>

    <script src="../fuente/js/core/auth.js"></script>
    <script src="../fuente/js/login.js"></script>
</body>
</html>
